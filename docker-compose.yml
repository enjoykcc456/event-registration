services:
  mysql:
    image: mysql:8.0
    container_name: event_registration_db
    restart: unless-stopped
    # Credentials are for local development only.
    # For production, inject via environment variables or a secrets manager.
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: event_registration
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-ppassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
